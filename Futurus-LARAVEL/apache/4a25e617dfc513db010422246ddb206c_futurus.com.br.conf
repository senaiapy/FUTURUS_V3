#PROXY-START/
<IfModule mod_proxy.c>
    ProxyRequests Off
    SSLProxyEngine on
    ProxyPass / http://localhost:4444/
    ProxyPassReverse / http://localhost:4444/
    ProxyPreserveHost On

    # Proxy headers to pass real domain and protocol to Laravel
    ProxyPassReverseCookieDomain localhost futurus.com.br
    ProxyPassReverseCookiePath / /

    # SSL Proxy Headers for HTTPS
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "futurus.com.br"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s
    </IfModule>
#PROXY-END/