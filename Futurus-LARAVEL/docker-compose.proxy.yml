# Docker Compose with Traefik Reverse Proxy for Domain/SSL Support
# Use with: docker compose -f docker-compose.prod.yml -f docker-compose.proxy.yml up -d
#
# Requires APP_URL in root .env (e.g., APP_URL=https://futurus.us)

services:
  traefik:
    image: traefik:v2.10
    container_name: futurus-traefik
    restart: always
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@futurus.us}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - futurus-network

  app:
    # Remove direct port exposure when using proxy
    ports: []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.futurus.rule=Host(`${DOMAIN:-futurus.us}`)"
      - "traefik.http.routers.futurus.entrypoints=websecure"
      - "traefik.http.routers.futurus.tls.certresolver=letsencrypt"
      - "traefik.http.services.futurus.loadbalancer.server.port=80"
    depends_on:
      - traefik
      - db

volumes:
  traefik-letsencrypt:
