services:
  db:
    image: postgres:15-alpine
    container_name: ${NEXT_PUBLIC_APP_NAME:-futurus}-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-galo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-galo}
      POSTGRES_DB: ${DB_DATABASE:-futurus_fullstack}
    ports:
      - "${DB_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${NEXT_PUBLIC_APP_NAME:-futurus}-backend
    restart: always
    command: npm run start:dev
    ports:
      - "${BACKEND_PORT:-3302}:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
      - ../Futurus-LARAVEL/assets/verify:/app/laravel_verify
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME:-galo}:${DB_PASSWORD:-galo}@db:5432/${DB_DATABASE:-futurus_fullstack}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      PORT: 3001
      PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.0.0}
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-3300},http://localhost:${ADMIN_PORT:-3301},http://localhost:${BACKEND_PORT:-3302}
    depends_on:
      - db

    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3302}/api
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Futurus}
        NEXT_PUBLIC_COIN_NAME: ${NEXT_PUBLIC_COIN_NAME:-Futurus Coin}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.0.0}
    container_name: ${NEXT_PUBLIC_APP_NAME:-futurus}-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3300}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3302}/api
      INTERNAL_API_URL: http://backend:3001/api
      NEXTAUTH_SECRET: super-secret-nextauth-key
      AUTH_SECRET: super-secret-nextauth-key
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: http://localhost:${FRONTEND_PORT:-3300}
    depends_on:
      - backend
    networks:
      - app-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3302}/api
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Futurus}
        NEXT_PUBLIC_COIN_NAME: ${NEXT_PUBLIC_COIN_NAME:-Futurus Coin}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.0.0}
    container_name: ${NEXT_PUBLIC_APP_NAME:-futurus}-admin
    restart: always
    ports:
      - "${ADMIN_PORT:-3301}:3002"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3302}/api
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
