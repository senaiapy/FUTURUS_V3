###############################################################################
#  docker-compose.yml — Production (Solana Mainnet-Beta)
#
#  ⚠️  For development/testing, use: docker-compose.dev.yml
#  Start with:  ./setup.sh          (production)
#               ./setup-dev.sh      (devnet/dev)
###############################################################################
services:
  mongodb:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=prediction-market

  backend:
    build:
      context: ./prediction-market-backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - DB_URL=mongodb://mongodb:27017/prediction-market
      - PASSKEY=${PASSKEY:-change-me-production-passkey}
      - FUTANA_RPC_URL=${FUTANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      - FUTANA_CLUSTER=mainnet-beta
      - FUT_MINT=${FUT_MINT:-CHANGE_ME_MAINNET_FUT_MINT_ADDRESS}
    depends_on:
      mongodb:
        condition: service_started

  frontend:
    build:
      context: ./prediction-market-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8082}
        - NEXT_PUBLIC_FUTANA_RPC_URL=${NEXT_PUBLIC_FUTANA_RPC_URL:-https://api.mainnet-beta.solana.com}
        - NEXT_PUBLIC_FUT_MINT=${NEXT_PUBLIC_FUT_MINT:-CHANGE_ME_MAINNET_FUT_MINT_ADDRESS}
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8082}
      - NEXT_PUBLIC_FUTANA_RPC_URL=${NEXT_PUBLIC_FUTANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      - NEXT_PUBLIC_FUT_MINT=${NEXT_PUBLIC_FUT_MINT:-CHANGE_ME_MAINNET_FUT_MINT_ADDRESS}
    depends_on:
      - backend

volumes:
  mongodb_data:
