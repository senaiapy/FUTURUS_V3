services:
  prevejo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prevejo-app
    restart: always
    ports:
      - "4447:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
